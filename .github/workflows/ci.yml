name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - id: release_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

          npm_published=false
          for attempt in 1 2 3; do
            if npm view "$PACKAGE_NAME@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              npm_published=true
              break
            fi
            echo "npm view check attempt $attempt did not find $PACKAGE_NAME@$VERSION"
            sleep 2
          done
          echo "npm_published=$npm_published" >> "$GITHUB_OUTPUT"
      - run: npm ci
        if: steps.release_meta.outputs.release_exists == 'false' || steps.release_meta.outputs.npm_published == 'false'
      - run: npm test
        if: steps.release_meta.outputs.release_exists == 'false' || steps.release_meta.outputs.npm_published == 'false'
      - run: npm run build
        if: steps.release_meta.outputs.release_exists == 'false' || steps.release_meta.outputs.npm_published == 'false'
      - uses: softprops/action-gh-release@v2
        if: steps.release_meta.outputs.release_exists == 'false'
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: v${{ steps.release_meta.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: false
          files: |
            dist/**
            README.md
            LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          PACKAGE_NAME="${{ steps.release_meta.outputs.package_name }}"
          VERSION="${{ steps.release_meta.outputs.version }}"

          if npm view "$PACKAGE_NAME@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION is already published; skipping npm publish."
            exit 0
          fi

          npm publish --access public
        if: steps.release_meta.outputs.npm_published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
